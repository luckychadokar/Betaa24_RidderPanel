{% extends 'base.html' %}
{% block page_title %}Add Customer{% endblock %}
{% block breadcrumb %}Customers › Add{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;">
  <div class="card-title" style="margin-bottom:16px;">
    <i class="fa-solid fa-user-plus" style="color:var(--y);margin-right:7px;"></i>Add New Customer
  </div>
  <form method="post">{% csrf_token %}
    <div class="fg">
      <label>Customer Name *</label>
      <input type="text" name="customer_name" required placeholder="e.g. Rahul Sharma">
    </div>
    <div class="fg">
      <label>Mobile Number *</label>
      <input type="text" name="customer_mobile" maxlength="10" required placeholder="10 digit mobile">
    </div>
    <div style="display:flex;gap:10px;margin-top:6px;">
      <button type="submit" class="btn btn-y">
        <i class="fa-solid fa-check"></i> Save Customer
      </button>
      <a href="{% url 'customer_wallet_list' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
