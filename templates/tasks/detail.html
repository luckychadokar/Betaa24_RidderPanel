{% extends 'base.html' %}
{% block page_title %}Task {{ task.task_id }}{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;">
    <div>
      <div style="font-size:20px;font-weight:800;color:var(--y);">{{ task.task_id }}</div>
      <span class="badge {% if task.status == 'completed' %}b-g{% elif task.status == 'cancelled' %}b-r{% else %}b-w{% endif %}" style="margin-top:6px;">{{ task.status|title }}</span>
    </div>
    <div style="font-size:26px;font-weight:800;color:var(--ok);">&#8377;{{ task.earnings }}</div>
  </div>
  {% for l,v in rows %}
  <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--b);font-size:13px;"><span style="color:var(--t2);">{{ l }}</span><span style="font-weight:600;">{{ v }}</span></div>
  {% endfor %}
  <div style="display:flex;gap:10px;margin-top:16px;">
    <a href="{% url 'task_edit' task.pk %}" class="btn btn-y">Edit</a>
    <a href="{% url 'task_delete' task.pk %}" class="btn btn-r">Delete</a>
    <a href="{% url 'task_list' %}" class="btn btn-ghost">Back</a>
  </div>
</div>
{% endblock %}
