{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Beta24 Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0A0A0A;font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:#111;border:1px solid rgba(255,215,0,.22);border-radius:16px;padding:40px 36px;width:380px;}
img{width:150px;display:block;margin:0 auto 28px;}
h2{text-align:center;color:#F0F0F0;font-size:18px;margin-bottom:6px;}
.sub{text-align:center;color:#606060;font-size:12px;margin-bottom:28px;}
label{display:block;font-size:11px;font-weight:700;color:#909090;text-transform:uppercase;margin-bottom:5px;}
input{width:100%;background:#181818;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:10px 13px;color:#F0F0F0;font-size:13px;outline:none;margin-bottom:14px;}
input:focus{border-color:#FFD700;}
button{width:100%;background:#FFD700;color:#000;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;}
button:hover{background:#ffe033;}
.err{background:rgba(239,68,68,.1);color:#EF4444;border:1px solid rgba(239,68,68,.2);border-radius:7px;padding:9px 13px;font-size:12px;margin-bottom:14px;}
</style>
</head>
<body>
<div class="box">
  <img src="{% static 'img/logo.png' %}" alt="Beta24" onerror="this.style.display='none'">
  <h2>Admin Login</h2>
  <div class="sub">Beta24 Rider Management System</div>
  {% if form.errors %}<div class="err">&#x26A0; Invalid username or password.</div>{% endif %}
  <form method="post">{% csrf_token %}
    <label>Username</label><input type="text" name="username" autofocus>
    <label>Password</label><input type="password" name="password">
    <button type="submit">Login to Beta24</button>
  </form>
</div>
</body>
</html>
